<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div
      class="mx-auto flex min-h-screen max-w-7xl flex-col px-4 py-6 sm:px-6 lg:px-8"
    >
      <header
        class="flex items-center justify-between rounded-2xl border border-slate-800 bg-slate-900/80 px-6 py-4 shadow-lg shadow-cyan-950/20"
      >
        <div>
          <p class="text-sm uppercase tracking-[0.25em] text-cyan-400">
            Admin panel
          </p>
          <h1 class="text-xl font-semibold">User dashboard</h1>
        </div>
        <button
          id="logout"
          class="rounded-full border border-slate-700 px-4 py-2 text-sm text-slate-300 transition hover:border-cyan-400 hover:text-white"
        >
          Logout
        </button>
      </header>

      <section class="mt-8 grid gap-6 md:grid-cols-2">
        <div class="rounded-2xl border border-slate-800 bg-slate-900/80 p-6">
          <p class="text-sm uppercase tracking-[0.25em] text-slate-400">
            Total Users
          </p>
          <p id="totalUsers" class="mt-3 text-4xl font-semibold text-white">
            ...
          </p>
        </div>
        <div class="rounded-2xl border border-slate-800 bg-slate-900/80 p-6">
          <p class="text-sm uppercase tracking-[0.25em] text-slate-400">
            Users this month
          </p>
          <p id="usersThisMonth" class="mt-3 text-4xl font-semibold text-white">
            ...
          </p>
        </div>
      </section>

      <section
        class="mt-8 overflow-hidden rounded-2xl border border-slate-800 bg-slate-900/80"
      >
        <div class="border-b border-slate-800 px-6 py-4">
          <h2 class="text-lg font-semibold">User list</h2>
        </div>
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-slate-800 text-sm">
            <thead class="bg-slate-950/70 text-left text-slate-300">
              <tr>
                <th class="px-6 py-3 font-medium">First Name</th>
                <th class="px-6 py-3 font-medium">Last Name</th>
                <th class="px-6 py-3 font-medium">Username</th>
                <th class="px-6 py-3 font-medium">Email</th>
                <th class="px-6 py-3 font-medium">Phone</th>
                <th class="px-6 py-3 font-medium">DOB</th>
                <th class="px-6 py-3 font-medium">Gender</th>
                <th class="px-6 py-3 font-medium">Created At</th>
              </tr>
            </thead>
            <tbody
              id="usersTableBody"
              class="divide-y divide-slate-800 text-slate-200"
            >
              <tr>
                <td class="px-6 py-4">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
    <script src="assets/js/script.js"></script>
    <script src="assets/js/dashboard.js"></script>
  </body>
</html>
